<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geek5 — Software Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .container { max-width: 600px; text-align: center; }
        .logo {
            font-size: 64px;
            font-weight: 800;
            letter-spacing: -3px;
            background: linear-gradient(135deg, #6366f1, #06b6d4, #6366f1);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s ease infinite;
            margin-bottom: 16px;
        }
        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .tagline {
            font-size: 18px;
            color: #888;
            margin-bottom: 48px;
            line-height: 1.6;
        }
        .apps { display: flex; flex-direction: column; gap: 16px; }
        .app-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 24px;
            background: #111;
            border: 1px solid #222;
            border-radius: 16px;
            text-decoration: none;
            color: #fff;
            transition: all 0.2s;
        }
        .app-card:hover { background: #1a1a1a; border-color: #333; transform: translateY(-2px); }
        .app-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }
        .app-info { text-align: left; }
        .app-name { font-size: 17px; font-weight: 600; }
        .app-desc { font-size: 14px; color: #888; margin-top: 4px; }
        .arrow { margin-left: auto; color: #444; font-size: 20px; }
        footer {
            margin-top: 64px;
            font-size: 13px;
            color: #444;
        }
        footer a { color: #666; text-decoration: none; }
        footer a:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">geek5</div>
        <p class="tagline">Software studio. Des apps simples<br>qui font bien leur travail.</p>

        <div class="apps">
            <a href="/quittances" class="app-card">
                <div class="app-icon" style="background: linear-gradient(135deg, #3b82f6, #2563eb);">
                    🏠
                </div>
                <div class="app-info">
                    <div class="app-name">Quittances</div>
                    <div class="app-desc">Générez vos quittances de loyer en un tap</div>
                </div>
                <span class="arrow">›</span>
            </a>
        </div>

        <footer>
            <p>&copy; 2026 Geek5 &middot; Samir Idris &middot; <a href="mailto:samir@geek5.org">Contact</a></p>
        </footer>
    </div>
</body>
</html>
